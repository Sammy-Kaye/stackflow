# StackFlow — Docker Compose
#
# Brings up the complete local development stack with a single command:
#   docker compose up -d
#
# Services: postgres, rabbitmq, api, frontend
# Note: MinIO (object storage) is excluded from this file.
#       File storage is a Phase 2 concern — added when that feature is built.
#
# All sensitive values are read from a .env file at the project root.
# Copy .env.example to .env and fill in the values before running.
#
# Service URLs (local dev):
#   API:            http://localhost:5000
#   Swagger UI:     http://localhost:5000/swagger
#   Frontend:       http://localhost:3000
#   RabbitMQ UI:    http://localhost:15672  (guest / guest)
#   PostgreSQL:     localhost:5432

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  # Primary data store. All StackFlow data lives here.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  # Message broker for async events (task assigned, workflow completed, etc.)
  # Management UI available at http://localhost:15672 — login: guest / guest
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP protocol — used by the API to publish/consume messages
      - "15672:15672"  # Management UI — monitor queues and exchanges in the browser
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (.NET 10 / ASP.NET Core) ─────────────────────────────────────────────
  # The StackFlow backend. Built from ./web-api/Dockerfile.
  # Mapped to localhost:5000 on the host.
  api:
    build:
      context: ./web-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Jwt__Secret: ${Jwt__Secret}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Jwt__AccessTokenExpiryMinutes: ${Jwt__AccessTokenExpiryMinutes}
      Jwt__RefreshTokenExpiryDays: ${Jwt__RefreshTokenExpiryDays}
      RabbitMq__Host: ${RabbitMq__Host}
      RabbitMq__Port: ${RabbitMq__Port}
      RabbitMq__Username: ${RabbitMq__Username}
      RabbitMq__Password: ${RabbitMq__Password}
      Email__SmtpHost: ${Email__SmtpHost}
      Email__SmtpPort: ${Email__SmtpPort}
      Email__Username: ${Email__Username}
      Email__Password: ${Email__Password}
      Email__FromAddress: ${Email__FromAddress}
      Email__FromName: ${Email__FromName}
      Storage__ServiceUrl: ${Storage__ServiceUrl}
      Storage__AccessKey: ${Storage__AccessKey}
      Storage__SecretKey: ${Storage__SecretKey}
      Storage__BucketName: ${Storage__BucketName:-stackflow}
      Storage__Region: ${Storage__Region:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend (React 19 / Vite / Nginx) ─────────────────────────────────────
  # Built from ./web-frontend/Dockerfile (multi-stage: Vite build → Nginx serve).
  # Mapped to localhost:3000 on the host.
  frontend:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - api

# ── Named volumes ──────────────────────────────────────────────────────────────
# Docker manages these volumes. Data persists across container restarts.
# Run `docker compose down -v` to destroy volumes and start fresh.
volumes:
  postgres_data:
