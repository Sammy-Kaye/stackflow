<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding | StackFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-low": "#1c1b1b",
            "surface-variant": "#353534",
            "secondary": "#a5d0ba",
            "inverse-surface": "#e5e2e1",
            "tertiary": "#ffb3ad",
            "on-surface": "#e5e2e1",
            "on-secondary-container": "#97c2ac",
            "outline-variant": "#3d4943",
            "on-surface-variant": "#bccac1",
            "tertiary-fixed-dim": "#ffb3ad",
            "on-primary-fixed": "#002115",
            "on-primary-fixed-variant": "#00513a",
            "secondary-fixed-dim": "#a5d0ba",
            "on-secondary-fixed": "#002115",
            "secondary-fixed": "#c0ecd6",
            "inverse-on-surface": "#313030",
            "surface-container-lowest": "#0e0e0e",
            "primary-container": "#26a37a",
            "on-background": "#e5e2e1",
            "secondary-container": "#295140",
            "surface-container-high": "#2a2a2a",
            "on-error-container": "#ffdad6",
            "on-tertiary-fixed-variant": "#7e2a27",
            "on-primary-container": "#003121",
            "outline": "#87948c",
            "on-secondary-fixed-variant": "#264e3e",
            "surface-container-highest": "#353534",
            "on-tertiary": "#5f1413",
            "primary-fixed-dim": "#68dbae",
            "background": "#131313",
            "on-tertiary-container": "#560d0e",
            "on-primary": "#003827",
            "surface-container": "#201f1f",
            "error": "#ffb4ab",
            "on-tertiary-fixed": "#410003",
            "error-container": "#93000a",
            "primary-fixed": "#86f8c9",
            "on-error": "#690005",
            "surface-bright": "#3a3939",
            "primary": "#68dbae",
            "surface": "#131313",
            "tertiary-container": "#db726b",
            "surface-dim": "#131313",
            "inverse-primary": "#006c4e",
            "on-secondary": "#0d3728",
            "tertiary-fixed": "#ffdad6",
            "surface-tint": "#68dbae"
          },
          fontFamily: {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    body {
      background-color: #131313;
      color: #E5E2E1;
      font-family: 'Inter', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .primary-gradient {
      background: linear-gradient(135deg, #68DBAE 0%, #26A37A 100%);
    }
    .primary-glow:hover {
      box-shadow: 0 0 15px -5px #86F8C9;
    }
  </style>
</head>
<body class="bg-surface flex items-center justify-center min-h-screen p-6">
<!-- Main Onboarding Container -->
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Branding -->
<div class="mb-12">
<h1 class="font-headline font-extrabold text-2xl tracking-tighter text-on-surface">
        StackFlow
      </h1>
</div>
<!-- Onboarding Card -->
<div class="w-full bg-surface-container p-8 rounded-xl relative overflow-hidden">
<!-- Progress Indicator (3 Segments) -->
<div class="flex gap-2 mb-10">
<div class="h-1 flex-1 bg-primary rounded-full transition-all duration-500"></div>
<div class="h-1 flex-1 bg-outline-variant/20 rounded-full"></div>
<div class="h-1 flex-1 bg-outline-variant/20 rounded-full"></div>
</div>
<!-- Header Section -->
<div class="mb-8">
<h2 class="font-headline font-bold text-2xl text-on-surface tracking-tight leading-tight">
          Let's set up your workspace
        </h2>
<p class="font-body text-sm text-on-surface-variant mt-2">
          Think of this as your digital headquarters. You can always change the name later.
        </p>
</div>
<!-- Form Section -->
<form class="space-y-8" onsubmit="return false;">
<div>
<label class="block font-headline text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-3" for="workspace-name">
            Workspace Name
          </label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-md px-4 py-3.5 text-on-surface placeholder-on-surface-variant/40 focus:ring-1 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="workspace-name" name="workspace-name" placeholder="Enter workspace name" type="text" value="Sam's workspace"/>
</div>
</div>
<div class="flex flex-col gap-4 pt-2">
<!-- Primary CTA -->
<button class="primary-gradient primary-glow w-full py-3.5 rounded-lg text-on-primary-container font-headline font-bold text-sm tracking-wide transition-all transform active:scale-95">
            Continue
          </button>
<!-- Secondary/Ghost Action -->
<button class="w-full py-2 text-on-surface-variant hover:text-on-surface text-sm font-body transition-colors duration-200 flex items-center justify-center gap-2 group">
<span>Skip setup</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Atmospheric Decoration (Subtle Tonal Shift) -->
<div class="absolute -bottom-16 -right-16 w-48 h-48 bg-primary/5 rounded-full blur-[64px] pointer-events-none"></div>
</div>
<!-- Footer Security/Help Context -->
<div class="mt-8 flex items-center gap-6 text-[11px] font-label text-on-surface-variant/40 uppercase tracking-widest">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">lock</span>
        Secure Workspace
      </div>
<div class="flex items-center gap-1.5 cursor-pointer hover:text-on-surface-variant transition-colors">
<span class="material-symbols-outlined text-[14px]">help_outline</span>
        Need help?
      </div>
</div>
</div>
</body></html>
