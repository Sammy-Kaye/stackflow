<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-low": "#1c1b1b",
            "surface-variant": "#353534",
            "secondary": "#a5d0ba",
            "inverse-surface": "#e5e2e1",
            "tertiary": "#ffb3ad",
            "on-surface": "#e5e2e1",
            "on-secondary-container": "#97c2ac",
            "outline-variant": "#3d4943",
            "on-surface-variant": "#bccac1",
            "tertiary-fixed-dim": "#ffb3ad",
            "on-primary-fixed": "#002115",
            "on-primary-fixed-variant": "#00513a",
            "secondary-fixed-dim": "#a5d0ba",
            "on-secondary-fixed": "#002115",
            "secondary-fixed": "#c0ecd6",
            "inverse-on-surface": "#313030",
            "surface-container-lowest": "#0e0e0e",
            "primary-container": "#26a37a",
            "on-background": "#e5e2e1",
            "secondary-container": "#295140",
            "surface-container-high": "#2a2a2a",
            "on-error-container": "#ffdad6",
            "on-tertiary-fixed-variant": "#7e2a27",
            "on-primary-container": "#003121",
            "outline": "#87948c",
            "on-secondary-fixed-variant": "#264e3e",
            "surface-container-highest": "#353534",
            "on-tertiary": "#5f1413",
            "primary-fixed-dim": "#68dbae",
            "background": "#131313",
            "on-tertiary-container": "#560d0e",
            "on-primary": "#003827",
            "surface-container": "#201f1f",
            "error": "#ffb4ab",
            "on-tertiary-fixed": "#410003",
            "error-container": "#93000a",
            "primary-fixed": "#86f8c9",
            "on-error": "#690005",
            "surface-bright": "#3a3939",
            "primary": "#68dbae",
            "surface": "#131313",
            "tertiary-container": "#db726b",
            "surface-dim": "#131313",
            "inverse-primary": "#006c4e",
            "on-secondary": "#0d3728",
            "tertiary-fixed": "#ffdad6",
            "surface-tint": "#68dbae"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .primary-gradient {
      background: linear-gradient(135deg, #68dbae 0%, #26a37a 100%);
    }
    .glass-effect {
      background: rgba(53, 53, 52, 0.6);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/30">
<!-- Main Onboarding Wrapper -->
<main class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Brand Header -->
<header class="mb-12 flex flex-col items-center gap-8">
<div class="text-on-surface font-headline font-extrabold text-3xl tracking-tighter">
        StackFlow
      </div>
<!-- 3-Segment Progress Indicator -->
<nav aria-label="Progress" class="flex items-center gap-3">
<div class="h-1.5 w-12 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-12 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-12 rounded-full primary-gradient"></div>
</nav>
</header>
<!-- Selection Card Container -->
<section class="w-full max-w-3xl">
<div class="text-center mb-10">
<h1 class="text-on-surface font-headline font-bold text-3xl md:text-4xl tracking-tight mb-3">
          How do you want to start?
        </h1>
<p class="text-on-surface-variant font-medium">
          Choose a path to begin your automation journey.
        </p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Option A: Template -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-surface-container border border-outline-variant/10 hover:bg-surface-bright transition-all duration-300 text-left overflow-hidden">
<div class="mb-6 p-3 rounded-lg bg-surface-container-highest text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-3xl" data-icon="library_books">library_books</span>
</div>
<h2 class="text-xl font-headline font-bold text-on-surface mb-2">Use a template</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
            Choose from pre-built workflows designed for marketing, sales, and operations.
          </p>
<!-- Subtle Decorative Element -->
<div class="absolute -right-4 -bottom-4 opacity-5 group-hover:opacity-10 transition-opacity">
<span class="material-symbols-outlined text-8xl" data-icon="library_books">library_books</span>
</div>
</button>
<!-- Option B: Build My Own -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-surface-container border border-outline-variant/10 hover:bg-surface-bright transition-all duration-300 text-left overflow-hidden">
<div class="mb-6 p-3 rounded-lg bg-surface-container-highest text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-3xl" data-icon="drawing_board">whiteboard</span>
</div>
<h2 class="text-xl font-headline font-bold text-on-surface mb-2">Build my own</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
            Start with a blank workflow builder and connect your own unique technical stack.
          </p>
<!-- Subtle Decorative Element -->
<div class="absolute -right-4 -bottom-4 opacity-5 group-hover:opacity-10 transition-opacity">
<span class="material-symbols-outlined text-8xl" data-icon="drawing_board">whiteboard</span>
</div>
</button>
</div>
<!-- Footer Action -->
<footer class="mt-12 flex flex-col items-center gap-6">
<a class="text-on-surface-variant hover:text-primary font-medium text-sm transition-colors duration-200 decoration-outline-variant/30 underline-offset-4 underline" href="#">
          Explore the dashboard first
        </a>
</footer>
</section>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
</main>
<!-- Contextual Notification (Simulated) -->
<aside class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
<div class="glass-effect px-6 py-3 rounded-full border border-outline-variant/20 flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="text-xs font-medium text-on-surface-variant tracking-wide uppercase">Final step: Selecting Workspace Path</span>
</div>
</aside>
</body></html>
