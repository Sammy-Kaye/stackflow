<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-error": "#690005",
            "surface-container-highest": "#353534",
            "tertiary-container": "#db726b",
            "primary-fixed-dim": "#68dbae",
            "secondary-container": "#295140",
            "on-secondary-fixed-variant": "#264e3e",
            "surface-tint": "#68dbae",
            "secondary": "#a5d0ba",
            "on-tertiary-fixed": "#410003",
            "surface-container-lowest": "#0e0e0e",
            "surface-container": "#201f1f",
            "on-secondary-fixed": "#002115",
            "secondary-fixed-dim": "#a5d0ba",
            "primary-container": "#26a37a",
            "on-secondary": "#0d3728",
            "on-primary-container": "#003121",
            "surface-container-high": "#2a2a2a",
            "on-tertiary-fixed-variant": "#7e2a27",
            "tertiary": "#ffb3ad",
            "error-container": "#93000a",
            "surface": "#131313",
            "outline": "#87948c",
            "on-primary-fixed": "#002115",
            "on-tertiary-container": "#560d0e",
            "on-primary": "#003827",
            "on-secondary-container": "#97c2ac",
            "on-error-container": "#ffdad6",
            "primary-fixed": "#86f8c9",
            "inverse-surface": "#e5e2e1",
            "inverse-on-surface": "#313030",
            "on-tertiary": "#5f1413",
            "tertiary-fixed-dim": "#ffb3ad",
            "error": "#ffb4ab",
            "surface-dim": "#131313",
            "surface-container-low": "#1c1b1b",
            "inverse-primary": "#006c4e",
            "surface-variant": "#353534",
            "on-surface": "#e5e2e1",
            "secondary-fixed": "#c0ecd6",
            "outline-variant": "#3d4943",
            "background": "#131313",
            "on-surface-variant": "#bccac1",
            "on-background": "#e5e2e1",
            "surface-bright": "#3a3939",
            "primary": "#68dbae",
            "tertiary-fixed": "#ffdad6",
            "on-primary-fixed-variant": "#00513a"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .amber-glow {
      color: #FFB3AD;
      filter: drop-shadow(0 0 8px rgba(255, 179, 173, 0.2));
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopNavBar Implementation from Shared Components JSON -->
<nav class="fixed top-0 w-full flex justify-center items-center h-16 px-6 w-full bg-[#131313] z-50">
<div class="flex justify-between items-center w-full max-w-7xl">
<!-- Brand Logo -->
<div class="text-lg font-bold text-[#E5E2E1] font-headline tracking-tight">
        StackFlow
      </div>
<!-- Product Name / Sender Identity -->
<div class="font-manrope text-sm tracking-tight text-[#BCCAC1]">
        Sent by Acme Corp
      </div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-16">
<!-- Centered Card Container -->
<div class="w-full max-w-[480px] bg-surface-container-low rounded-xl p-10 flex flex-col items-center text-center relative overflow-hidden">
<!-- Subtle Decorative Atmospheric Element -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-tertiary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<!-- Large Amber Clock Icon -->
<div class="mb-8 p-6 bg-surface-container-lowest rounded-full">
<span class="material-symbols-outlined text-6xl amber-glow" style="font-variation-settings: 'wght' 200;">
          schedule
        </span>
</div>
<!-- Content Section -->
<div class="space-y-6 relative z-10">
<h1 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface">
          This link has expired
        </h1>
<div class="space-y-4">
<p class="text-on-surface-variant text-base leading-relaxed max-w-sm mx-auto">
            This link is no longer valid. Links expire after 7 days.
          </p>
<div class="pt-4 border-t border-outline-variant/10">
<p class="text-on-surface-variant text-sm font-medium">
              Contact <span class="text-on-surface">Sam Johnson</span> at Acme Corp to request a new link.
            </p>
</div>
</div>
</div>
<!-- Subtle Brand Recess -->
<div class="mt-12 flex items-center gap-2 opacity-30 grayscale">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<span class="text-[10px] uppercase tracking-widest font-bold font-headline">Secure Access Console</span>
</div>
</div>
</main>
<!-- Footer Info (Minimal) -->
<footer class="p-8 text-center">
<p class="text-[11px] font-label text-on-surface-variant/40 tracking-[0.2em] uppercase">
      StackFlow Enterprise Security System
    </p>
</footer>
</body></html>
