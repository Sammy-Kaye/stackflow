<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | StackFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#131313",
              "on-secondary-fixed-variant": "#264e3e",
              "surface": "#131313",
              "on-primary-fixed-variant": "#00513a",
              "surface-container": "#201f1f",
              "on-secondary-container": "#97c2ac",
              "error": "#ffb4ab",
              "primary-fixed-dim": "#68dbae",
              "on-secondary-fixed": "#002115",
              "surface-container-high": "#2a2a2a",
              "secondary": "#a5d0ba",
              "primary-container": "#26a37a",
              "on-tertiary-fixed": "#410003",
              "surface-tint": "#68dbae",
              "on-tertiary-fixed-variant": "#7e2a27",
              "on-surface-variant": "#bccac1",
              "on-secondary": "#0d3728",
              "tertiary": "#ffb3ad",
              "on-tertiary-container": "#560d0e",
              "on-primary-container": "#003121",
              "on-surface": "#e5e2e1",
              "inverse-primary": "#006c4e",
              "primary": "#68dbae",
              "outline-variant": "#3d4943",
              "secondary-fixed": "#c0ecd6",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "surface-bright": "#3a3939",
              "on-error": "#690005",
              "secondary-container": "#295140",
              "inverse-on-surface": "#313030",
              "secondary-fixed-dim": "#a5d0ba",
              "on-background": "#e5e2e1",
              "surface-container-highest": "#353534",
              "inverse-surface": "#e5e2e1",
              "tertiary-fixed": "#ffdad6",
              "surface-dim": "#131313",
              "on-primary-fixed": "#002115",
              "on-primary": "#003827",
              "surface-container-low": "#1c1b1b",
              "tertiary-container": "#db726b",
              "surface-variant": "#353534",
              "surface-container-lowest": "#0e0e0e",
              "on-tertiary": "#5f1413",
              "primary-fixed": "#86f8c9",
              "tertiary-fixed-dim": "#ffb3ad",
              "outline": "#87948c"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .teal-gradient {
            background: linear-gradient(135deg, #68DBAE 0%, #26A37A 100%);
        }
        .primary-glow:hover {
            box-shadow: 0 0 15px -5px #86F8C9;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body antialiased min-h-screen flex flex-col justify-center items-center px-4">
<!-- Header Section (Suppressed Shell as per UX Goal for Login) -->
<header class="mb-8 text-center">
<a class="inline-block" href="#">
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-[#E5E2E1]">
                StackFlow
            </h1>
</a>
</header>
<!-- Login Container -->
<main class="w-full max-w-[440px]">
<!-- Tonal Layering: surface-container on surface-container-low -->
<div class="bg-surface-container-low p-8 rounded-xl shadow-2xl relative overflow-hidden group">
<!-- Branding/Instructional Area -->
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold tracking-tight mb-2 text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant text-sm">Please enter your details to sign in.</p>
</div>
<!-- Social Provider -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container hover:bg-surface-container-high transition-colors duration-200 py-3 rounded-md border border-outline-variant/20 text-on-surface font-medium mb-6 active:scale-[0.98]">
<img alt="" class="w-5 h-5" data-alt="minimalist clean google logo icon with vibrant four colors on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB69SsIi7pMxMJIqzoCtQz5yHzqdsBOGfvAXT_kzAW-LQjPLEtHbEGjqzP8MhQVV6v_Upj3Q_ejx0pZ0xPp00bhYBGjcDV9xP6E_RwcFZAdbkee-lBWHSWwUV8DLw_RLh3DfhtG4FNdwQPvsW9DCvtKMl57x3ckOppk84MWnuqJnon-Uqm7MKOfwxrQTsfbMycpR0h8Gln_mMGGTjyyyRam9SLQZLNn_MGgAQXkGO0yDn6mJNHnB-rc7HJ_3MdWpD1YUjoW2fk5y6qb"/>
                Continue with Google
            </button>
<!-- Divider -->
<div class="relative flex items-center mb-6">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-on-surface-variant/60 uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Form -->
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant tracking-wide px-1" for="email">Email address</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline-variant/10 rounded-md py-3 px-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary/40 transition-all outline-none" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface-variant tracking-wide" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant/10 rounded-md py-3 px-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary/40 transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-on-surface transition-colors p-1 flex items-center" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant/30 bg-surface-container-lowest text-primary focus:ring-offset-background focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="text-xs text-on-surface-variant font-medium" for="remember">Remember me</label>
</div>
<!-- Submit Button -->
<button class="teal-gradient w-full py-3.5 rounded-md text-on-primary-container font-bold text-sm tracking-tight transition-transform active:scale-95 primary-glow mt-4" type="submit">
                    Log in
                </button>
</form>
<!-- Bottom Link -->
<p class="text-center mt-8 text-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-on-surface font-semibold hover:text-primary transition-colors underline decoration-outline-variant/30 underline-offset-4" href="#">Sign up</a>
</p>
</div>
<!-- Semantic Footer as defined in JSON but adapted for Login Focused Task -->
<footer class="mt-12 flex justify-center gap-6 text-[10px] text-on-surface-variant/50 uppercase tracking-[0.2em] font-headline">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="opacity-30">•</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="opacity-30">•</span>
<a class="hover:text-primary transition-colors" href="#">Cookie Settings</a>
</footer>
</main>
<!-- Ambient background element for Depth -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] rounded-full bg-primary-container/5 blur-[100px]"></div>
</div>
</body></html>
