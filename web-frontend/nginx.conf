# Nginx configuration for StackFlow frontend.
# Serves the Vite-built React SPA.
#
# The key directive is `try_files $uri $uri/ /index.html`:
# When a user navigates directly to a React Router path (e.g. /workflows/123),
# Nginx first looks for a matching file, then a matching directory,
# and finally falls back to index.html — letting React Router handle the route.
# Without this, a page refresh on any sub-route returns 404.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-lived cache headers.
    # Vite hashes filenames on build, so stale content is not a concern.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other requests fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
