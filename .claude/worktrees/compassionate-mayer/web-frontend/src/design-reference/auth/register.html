<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#131313",
            "on-secondary-fixed-variant": "#264e3e",
            "surface": "#131313",
            "on-primary-fixed-variant": "#00513a",
            "surface-container": "#201f1f",
            "on-secondary-container": "#97c2ac",
            "error": "#ffb4ab",
            "primary-fixed-dim": "#68dbae",
            "on-secondary-fixed": "#002115",
            "surface-container-high": "#2a2a2a",
            "secondary": "#a5d0ba",
            "primary-container": "#26a37a",
            "on-tertiary-fixed": "#410003",
            "surface-tint": "#68dbae",
            "on-tertiary-fixed-variant": "#7e2a27",
            "on-surface-variant": "#bccac1",
            "on-secondary": "#0d3728",
            "tertiary": "#ffb3ad",
            "on-tertiary-container": "#560d0e",
            "on-primary-container": "#003121",
            "on-surface": "#e5e2e1",
            "inverse-primary": "#006c4e",
            "primary": "#68dbae",
            "outline-variant": "#3d4943",
            "secondary-fixed": "#c0ecd6",
            "on-error-container": "#ffdad6",
            "error-container": "#93000a",
            "surface-bright": "#3a3939",
            "on-error": "#690005",
            "secondary-container": "#295140",
            "inverse-on-surface": "#313030",
            "secondary-fixed-dim": "#a5d0ba",
            "on-background": "#e5e2e1",
            "surface-container-highest": "#353534",
            "inverse-surface": "#e5e2e1",
            "tertiary-fixed": "#ffdad6",
            "surface-dim": "#131313",
            "on-primary-fixed": "#002115",
            "on-primary": "#003827",
            "surface-container-low": "#1c1b1b",
            "tertiary-container": "#db726b",
            "surface-variant": "#353534",
            "surface-container-lowest": "#0e0e0e",
            "on-tertiary": "#5f1413",
            "primary-fixed": "#86f8c9",
            "tertiary-fixed-dim": "#ffb3ad",
            "outline": "#87948c"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(53, 53, 52, 0.6);
      backdrop-filter: blur(12px);
    }
    .teal-gradient {
      background: linear-gradient(135deg, #68dbae 0%, #26a37a 100%);
    }
    .primary-glow:hover {
      box-shadow: 0 0 15px -5px #86f8c9;
    }
    .ghost-border {
      border: 1px solid rgba(61, 73, 67, 0.2);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body antialiased min-h-screen flex flex-col justify-center items-center py-12 px-4 selection:bg-primary-container selection:text-on-primary-container">
<!-- Brand Anchor (Top Level Navigation is suppressed for focused Transactional screen) -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Identity -->
<a class="mb-10 inline-block focus:outline-none focus:ring-2 focus:ring-primary/20 rounded-lg" href="/">
<span class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface">StackFlow</span>
</a>
<!-- Registration Card -->
<div class="w-full bg-surface-container-low rounded-xl p-8 shadow-2xl relative overflow-hidden">
<!-- Decorative Atmospheric Depth Element -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 blur-[80px] rounded-full"></div>
<div class="relative z-10">
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-2">Create your account</h1>
<p class="text-on-surface-variant text-sm mb-8">Join the next generation of workflow orchestration.</p>
<!-- Social Auth -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface-container rounded-lg ghost-border hover:bg-surface-bright transition-all duration-200 active:scale-[0.98] group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-medium text-on-surface">Continue with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
<span class="px-4 text-xs font-label uppercase tracking-widest text-on-surface-variant/60">or</span>
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
</div>
<!-- Registration Form -->
<form class="space-y-5">
<!-- Full Name -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant ml-1" for="name">Full Name</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/40 transition-all duration-200" id="name" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface-variant ml-1" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/40 transition-all duration-200" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-1.5">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-medium text-on-surface-variant" for="password">Password</label>
<button class="text-xs font-semibold text-primary hover:text-primary-fixed transition-colors" type="button">Show</button>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/40 transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Strength Indicator -->
<div class="pt-2 flex gap-1">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<p class="text-[10px] text-on-surface-variant/80 mt-1 italic">Strong password</p>
</div>
<!-- Confirm Password -->
<div class="space-y-1.5">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-medium text-on-surface-variant" for="confirm-password">Confirm Password</label>
<button class="text-xs font-semibold text-primary hover:text-primary-fixed transition-colors" type="button">Show</button>
</div>
<input class="w-full bg-surface-container-lowest border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/40 transition-all duration-200" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full teal-gradient text-on-primary-container font-semibold py-3.5 rounded-lg primary-glow transition-all duration-300 active:scale-[0.97] shadow-lg shadow-primary/10" type="submit">
              Create account
            </button>
</div>
</form>
<!-- Terms Note -->
<p class="mt-6 text-[11px] text-center text-on-surface-variant leading-relaxed px-4">
          By clicking "Create account", you agree to our <a class="text-on-surface hover:text-primary underline underline-offset-4 decoration-outline-variant/40" href="#">Terms of Service</a> and <a class="text-on-surface hover:text-primary underline underline-offset-4 decoration-outline-variant/40" href="#">Privacy Policy</a>.
        </p>
</div>
</div>
<!-- Login Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
        Already have an account? 
        <a class="text-primary font-semibold hover:text-primary-fixed-dim transition-colors ml-1 decoration-primary/20 hover:underline underline-offset-4" href="/login">Log in</a>
</p>
</div>
</main>
<!-- Footer (Suppressed Brand Logo as per JSON logic, only links) -->
<footer class="fixed bottom-0 w-full flex justify-center gap-6 pb-8 text-center">
<a class="font-manrope text-sm text-[#BCCAC1] hover:text-[#1D9E75] transition-colors opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-manrope text-sm text-[#BCCAC1] hover:text-[#1D9E75] transition-colors opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-manrope text-sm text-[#BCCAC1] hover:text-[#1D9E75] transition-colors opacity-80 hover:opacity-100" href="#">Cookie Settings</a>
</footer>
</body></html>
