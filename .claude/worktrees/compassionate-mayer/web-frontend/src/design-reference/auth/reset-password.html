<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #131313;
      }
      .brand-logo {
        font-family: 'Manrope', sans-serif;
      }
      .teal-gradient {
        background: linear-gradient(135deg, #68dbae 0%, #26a37a 100%);
      }
      .glass-effect {
        background: rgba(53, 53, 52, 0.6);
        backdrop-filter: blur(12px);
      }
    </style>

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/30">
<!-- Brand Anchor: Top Navigation (Suppressed per "The Destination Rule" for Transactional flows) -->
<main class="w-full max-w-[440px] flex flex-col items-center animate-fade-in">
<!-- Brand Wordmark -->
<div class="mb-12">
<h1 class="text-2xl font-bold tracking-tighter text-on-surface brand-logo">StackFlow</h1>
</div>
<!-- Auth Card -->
<div class="w-full bg-surface-container-low p-10 rounded-xl flex flex-col gap-8">
<div class="space-y-2">
<h2 class="text-2xl font-headline font-bold tracking-tight text-on-surface">Set a new password</h2>
<p class="text-sm text-on-surface-variant leading-relaxed">Please choose a password you haven't used before to secure your account.</p>
</div>
<form class="flex flex-col gap-6" onsubmit="return false;">
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-xs font-medium text-on-surface-variant uppercase tracking-wider">New password</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-md px-4 py-3 text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/40 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="mt-2 flex items-center gap-1.5">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
<span class="ml-2 text-[10px] font-bold text-primary uppercase tracking-tighter">Strong</span>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="text-xs font-medium text-on-surface-variant uppercase tracking-wider">Confirm new password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-md px-4 py-3 text-on-surface placeholder:text-outline/40 focus:ring-1 focus:ring-primary/40 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="teal-gradient text-on-primary-container font-semibold py-3.5 rounded-md mt-4 transition-all active:scale-[0.98] hover:shadow-[0_0_15px_-5px_#86f8c9] flex items-center justify-center gap-2 group">
                    Save new password
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-0.5 transition-transform">arrow_forward</span>
</button>
</form>
</div>
<!-- Supportive Footer Elements (Minimal) -->
<div class="mt-8 flex flex-col items-center gap-4">
<a class="text-sm text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Back to login
            </a>
</div>
</main>
<!-- Footer Anchor (Modified for transactional context) -->
<footer class="fixed bottom-0 w-full flex justify-center gap-8 pb-8 text-center">
<span class="font-body text-xs text-on-surface-variant/60">© 2024 StackFlow. All rights reserved.</span>
<div class="flex gap-4">
<a class="font-body text-xs text-on-surface-variant/60 hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="font-body text-xs text-on-surface-variant/60 hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</footer>
<!-- Background Atmospheric Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-primary-container/5 blur-[100px]"></div>
</div>
