<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OTP Verification | StackFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#131313",
            "on-secondary-fixed-variant": "#264e3e",
            "surface": "#131313",
            "on-primary-fixed-variant": "#00513a",
            "surface-container": "#201f1f",
            "on-secondary-container": "#97c2ac",
            "error": "#ffb4ab",
            "primary-fixed-dim": "#68dbae",
            "on-secondary-fixed": "#002115",
            "surface-container-high": "#2a2a2a",
            "secondary": "#a5d0ba",
            "primary-container": "#26a37a",
            "on-tertiary-fixed": "#410003",
            "surface-tint": "#68dbae",
            "on-tertiary-fixed-variant": "#7e2a27",
            "on-surface-variant": "#bccac1",
            "on-secondary": "#0d3728",
            "tertiary": "#ffb3ad",
            "on-tertiary-container": "#560d0e",
            "on-primary-container": "#003121",
            "on-surface": "#e5e2e1",
            "inverse-primary": "#006c4e",
            "primary": "#68dbae",
            "outline-variant": "#3d4943",
            "secondary-fixed": "#c0ecd6",
            "on-error-container": "#ffdad6",
            "error-container": "#93000a",
            "surface-bright": "#3a3939",
            "on-error": "#690005",
            "secondary-container": "#295140",
            "inverse-on-surface": "#313030",
            "secondary-fixed-dim": "#a5d0ba",
            "on-background": "#e5e2e1",
            "surface-container-highest": "#353534",
            "inverse-surface": "#e5e2e1",
            "tertiary-fixed": "#ffdad6",
            "surface-dim": "#131313",
            "on-primary-fixed": "#002115",
            "on-primary": "#003827",
            "surface-container-low": "#1c1b1b",
            "tertiary-container": "#db726b",
            "surface-variant": "#353534",
            "surface-container-lowest": "#0e0e0e",
            "on-tertiary": "#5f1413",
            "primary-fixed": "#86f8c9",
            "tertiary-fixed-dim": "#ffb3ad",
            "outline": "#87948c"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .teal-gradient {
      background: linear-gradient(135deg, #68dbae 0%, #26a37a 100%);
    }
    .primary-glow:hover {
      box-shadow: 0 0 15px -5px #86f8c9;
    }
    /* Hide spin-buttons for Chrome, Safari, Edge, Opera */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    /* Hide spin-buttons for Firefox */
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-6 py-12">
<!-- Verification Card -->
<div class="w-full max-w-[440px] bg-surface-container-low p-8 md:p-10 rounded-xl flex flex-col items-center">
<!-- Brand Anchor -->
<div class="mb-10 text-center">
<h1 class="text-2xl font-bold tracking-tighter text-on-surface font-headline">StackFlow</h1>
</div>
<!-- Header -->
<div class="text-center mb-10">
<h2 class="text-2xl font-bold tracking-tight text-on-surface font-headline mb-3">Check your email</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
          We've sent a 6-digit verification code to<br/>
<span class="text-on-surface font-medium">alex.design@workspace.com</span>
</p>
</div>
<!-- OTP Input Group -->
<form class="w-full space-y-10">
<div class="flex justify-between gap-2 md:gap-3">
<input class="w-full h-14 md:h-16 text-center text-xl font-semibold bg-surface-container-lowest border-none rounded-lg text-primary focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all placeholder-transparent" maxlength="1" placeholder="0" type="number"/>
<input class="w-full h-14 md:h-16 text-center text-xl font-semibold bg-surface-container-lowest border-none rounded-lg text-primary focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all placeholder-transparent" maxlength="1" placeholder="0" type="number"/>
<input class="w-full h-14 md:h-16 text-center text-xl font-semibold bg-surface-container-lowest border-none rounded-lg text-primary focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all placeholder-transparent" maxlength="1" placeholder="0" type="number"/>
<input class="w-full h-14 md:h-16 text-center text-xl font-semibold bg-surface-container-lowest border-none rounded-lg text-primary focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all placeholder-transparent" maxlength="1" placeholder="0" type="number"/>
<input class="w-full h-14 md:h-16 text-center text-xl font-semibold bg-surface-container-lowest border-none rounded-lg text-primary focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all placeholder-transparent" maxlength="1" placeholder="0" type="number"/>
<input class="w-full h-14 md:h-16 text-center text-xl font-semibold bg-surface-container-lowest border-none rounded-lg text-primary focus:ring-2 focus:ring-primary/40 focus:outline-none transition-all placeholder-transparent" maxlength="1" placeholder="0" type="number"/>
</div>
<!-- Action Button -->
<button class="w-full py-4 rounded-lg teal-gradient text-on-primary-container font-bold text-base tracking-tight primary-glow transition-all active:scale-[0.98]" type="submit">
          Verify email
        </button>
</form>
<!-- Footer Actions -->
<div class="mt-10 flex flex-col items-center gap-6">
<div class="text-center">
<p class="text-xs font-medium text-on-surface-variant tracking-wider uppercase mb-1">Resend code in 0:45</p>
<button class="text-sm font-semibold text-outline-variant cursor-not-allowed transition-colors" disabled="">
            Resend code
          </button>
</div>
<a class="text-xs font-medium text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
          Use a different email
        </a>
</div>
</div>
</main>
<!-- Shared Footer -->
<footer class="flex justify-center gap-6 pb-8 w-full text-center font-manrope text-sm bg-transparent">
<a class="text-[#BCCAC1] hover:text-[#1D9E75] transition-colors opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="text-[#BCCAC1] hover:text-[#1D9E75] transition-colors opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="text-[#BCCAC1] hover:text-[#1D9E75] transition-colors opacity-80 hover:opacity-100" href="#">Cookie Settings</a>
</footer>
</body></html>
